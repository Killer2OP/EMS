# Server
server.port=8080
spring.application.name=vidyutseva-ems

# H2 Database
spring.datasource.url=jdbc:h2:mem:vidyutsevadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Seed data
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
jwt.secret=VidyutSevaTCSILP2024SuperSecretKeyMustBe256BitsLong!
jwt.expiration.ms=86400000

# Logging
logging.level.com.tcs.vidyutseva=DEBUG
logging.level.org.springframework.security=INFO
